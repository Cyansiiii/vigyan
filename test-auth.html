<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Auth Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #222;
            color: #0f0;
        }
    </style>
</head>

<body>
    <h1>Auth Diagnostics</h1>
    <div id="log"></div>

    <script src="frontend/js/config.js"></script>
    <script>
        const log = (msg) => {
            const el = document.getElementById('log');
            el.innerHTML += `<div>${msg}</div>`;
            console.log(msg);
        };

        async function runTest() {
            log('🚀 Starting Auth Test...');

            const API_URL = window.API_BASE_URL || 'http://localhost:3000';
            log(`🌐 API URL: ${API_URL}`);

            // 1. LOGIN
            try {
                log('🔐 Logging in as admin...');
                const loginRes = await fetch(`${API_URL}/api/admin/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin' })
                });

                log(`Login Status: ${loginRes.status}`);
                const loginData = await loginRes.json();

                if (!loginData.success) {
                    log(`❌ Login Failed: ${JSON.stringify(loginData)}`);
                    return;
                }

                const token = loginData.token;
                log(`✅ Login Success! Token: ${token.substring(0, 20)}...`);

                // 2. TEST DASHBOARD STATS
                log('📊 Testing Dashboard Stats...');
                const statsRes = await fetch(`${API_URL}/api/admin/dashboard/stats`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                log(`Stats Status: ${statsRes.status}`);
                const statsText = await statsRes.text();

                if (statsRes.status === 200) {
                    log(`✅ Stats Success: ${statsText.substring(0, 100)}...`);
                } else {
                    log(`❌ Stats Failed: ${statsText}`);
                }

            } catch (err) {
                log(`❌ EXCEPTION: ${err.message}`);
            }
        }

        runTest();
    </script>
</body>

</html>
