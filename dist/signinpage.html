    <style>
        * {
            box-sizing: border-box;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2d5a27;
            --primary-light: #4a7c44;
            --accent: #d4e157; /* Vibrant lime accent */
            --text-main: #1a2e1a;
            --text-muted: #6b7280;
            --white: #ffffff;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f0f4f0; /* Default bg */
            color: var(--text-main);
        }

        /* Large Background Image with soft dark vignette */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('/assets/login_bg-CRCOOSXl.png') no-repeat center center/cover;
            filter: brightness(0.9);
            z-index: 1;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 1100px;
            height: 680px;
            background: var(--white);
            border-radius: 48px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 50px 120px -30px rgba(0, 0, 0, 0.4);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Left Side - Poster Side */
        .poster-side {
            flex: 1.1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        .poster-bg {
            position: absolute;
            inset: 0;
            background: url('/assets/login_poster-B0EW0ifH.png') no-repeat center center/cover;
            z-index: 1;
            transition: var(--transition);
        }

        .poster-side:hover .poster-bg {
            transform: scale(1.03);
        }

        /* Darkening overlay for better text legibility */
        .poster-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
        }

        .social-proof {
            position: relative;
            z-index: 3;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 0.85rem;
            width: fit-content;
        }

        .avatars {
            display: flex;
            margin-right: -4px;
        }

        .avatars img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            margin-left: -12px;
        }
        .avatars img:first-child { margin-left: 0; }

        .avatars span {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 800;
            margin-left: -12px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .poster-content {
            position: relative;
            z-index: 3;
            color: white;
        }

        .poster-content h2 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            margin: 0 0 15px;
            letter-spacing: -1.5px;
        }

        .poster-content p {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.8;
            margin: 0;
            max-width: 80%;
        }

        /* Right Side - Form Side */
        .form-side {
            width: 480px;
            background: var(--white);
            position: relative;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 5;
        }

        /* THE SOPHISTICATED CURBS (Multiple Layered SVGs) */
        .curb-container {
            position: absolute;
            top: 0;
            left: -150px;
            height: 100%;
            width: 200px;
            pointer-events: none;
            z-index: 2;
        }

        .curb {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }

        .curb-white { fill: var(--white); z-index: 10; }
        .curb-accent { fill: var(--accent); opacity: 0.2; z-index: 9; transform: translateX(-20px); }

        .brand-logo {
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .brand-logo svg {
            width: 36px;
            height: 36px;
            fill: var(--primary);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 45px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 20px;
            border: 1.5px solid #f0f4f0;
            background: #fafcfb;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 10px 40px rgba(45, 90, 39, 0.08);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 22px;
            background: var(--primary);
            color: var(--white);
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(45, 90, 39, 0.2);
            margin-top: 25px;
        }

        .btn:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 20px 50px rgba(45, 90, 39, 0.35);
        }

        .btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            margin-top: 25px;
            padding: 16px;
            border-radius: 18px;
            background: #fff1f2;
            color: #d0052b;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #ffe4e6;
            display: none;
            animation: shake 0.4s ease-in-out;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Mobile - Focus on Form */
        @media (max-width: 900px) {
            .login-wrapper {
                flex-direction: column;
                height: auto;
                max-width: 500px;
                border-radius: 35px;
            }
            .poster-side {
                height: 280px;
                padding: 30px;
            }
            .poster-content h2 {
                font-size: 2.2rem;
            }
            .form-side {
                width: 100%;
                padding: 50px 30px;
            }
            .curb-container {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <!-- Left Column: Inspiring Imagery & Social Proof -->
        <div class="poster-side">
            <div class="poster-bg"></div>
            
            <div class="social-proof">
                <div class="avatars">
                    <img src="https://ui-avatars.com/api/?name=A&background=random" alt="User">
                    <img src="https://ui-avatars.com/api/?name=B&background=random" alt="User">
                    <img src="https://ui-avatars.com/api/?name=C&background=random" alt="User">
                    <span>12k+</span>
                </div>
                JOIN WITH 30K+ USERS!
            </div>

            <div class="poster-content">
                <h2>Empower<br>your Future.</h2>
                <p>Advanced IIT-JEE/NEET preparation with Vigyan.prep Test Series</p>
            </div>
        </div>
        
        <!-- Right Column: Clean, Organic Form -->
        <div class="form-side">
            <!-- SOPHISTICATED LAYERED CURBS -->
            <div class="curb-container">
                <!-- Accent Shadow Curb -->
                <svg class="curb curb-accent" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M100 0 C40 5 40 40 100 50 L100 50 C40 60 40 95 100 100 Z" />
                </svg>
                <!-- Main White Curb -->
                <svg class="curb curb-white" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M100 0 C50 10 50 45 100 50 L100 50 C50 55 50 90 100 100 Z" />
                </svg>
            </div>

            <div class="brand-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L1 21h22L12 2zm0 3.3L19.5 19H4.5L12 5.3z"/>
                </svg>
                Vigyan.prep
            </div>
            
            <h1>Student Login</h1>
            <p class="subtitle">Enter the Email used during payment and your 8-digit Roll Number to enter the hall.</p>
            
            <div class="input-group">
                <label for="emailInput">Registered Email</label>
                <input type="email" id="emailInput" placeholder="name@example.com" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="tokenInput">Roll Number</label>
                <input type="text" id="tokenInput" placeholder="12345678" maxlength="8" pattern="[0-9]{8}"
                    inputmode="numeric" title="8-digit roll number">
            </div>
            
            <button class="btn" id="loginBtn" onclick="attemptLogin()">
                <span id="btnText">Enter Exam Hall</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
            
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        async function attemptLogin() {
            const email = document.getElementById("emailInput").value.trim().toLowerCase();
            const token = document.getElementById("tokenInput").value.trim();
            const btn = document.getElementById("loginBtn");
            const btnText = document.getElementById("btnText");
            const spinner = document.getElementById("btnSpinner");
            const errorDiv = document.getElementById("errorMsg");

            errorDiv.style.display = 'none';

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError("❌ Please enter a valid email address.");
                return;
            }

            // Roll number validation (8 digits)
            const tokenRegex = /^[0-9]{8}$/;
            if (!tokenRegex.test(token)) {
                showError("❌ Roll number must be exactly 8 digits.");
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                // Ensure API_BASE_URL is handled via config.js
                const response = await axios.post(`${API_BASE_URL}/api/exam/start`, {
                    rollNumber: token,
                    email: email
                }, { timeout: 15000 });

                if (response.data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userRollNumber', token);
                    
                    const authToken = response.data.authToken || response.data.token;
                    localStorage.setItem('userToken', authToken || token);

                    const tests = response.data.purchasedTests || [];
                    const normalizedTests = tests.map(t => typeof t === 'string' ? t.toLowerCase().replace(' series', '').trim() : t);
                    localStorage.setItem('purchasedTests', JSON.stringify(normalizedTests));

                    btn.style.backgroundColor = "#10b981";
                    spinner.style.display = 'none';
                    btnText.innerText = "Verified ✓";
                    btnText.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = "testfirstpage.html";
                    }, 800);
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.style.display = 'block';

                let msg = "Server error. Please try again later.";
                if (error.code === 'ECONNABORTED') msg = "⏱️ Request timeout. Check your internet.";
                else if (error.response?.status === 404) msg = "❌ Invalid email or roll number.";
                else if (error.response?.data?.message) msg = error.response.data.message;

                showError(msg);
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById("errorMsg");
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });
    </script>
</body>
