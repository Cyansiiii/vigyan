<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - Vigyan.prep Test Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- Dynamic Configuration -->
    <script>
        // Fallback if config.js fails to load or window.API_BASE_URL is not set
        if (!window.API_BASE_URL) {
            window.API_BASE_URL = "https://vigyan-production.up.railway.app";
        }
        const API_BASE_URL = window.API_BASE_URL;
    </script>

    <style>
        * {
            box-sizing: border-box;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2d5a27;
            --primary-light: #4a7c44;
            --accent: #8fb935;
            --text-main: #1a2e1a;
            --text-muted: #6b7280;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: url('/assets/login_bg-CRCOOSXl.png') no-repeat center center/cover;
            color: var(--text-main);
        }

        /* Overlay for background for better contrast */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1000px;
            height: 600px;
            background: #fff;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Left Side - Poster */
        .poster-side {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 60px 40px;
        }

        .poster-image {
            position: absolute;
            inset: 0;
            background: url('/assets/login_poster-B0EW0ifH.png') no-repeat center center/cover;
            transform: scale(1.05);
            transition: var(--transition);
        }

        .poster-side:hover .poster-image {
            transform: scale(1);
        }

        /* Gradient overlay on poster */
        .poster-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 60%);
            z-index: 2;
        }

        .poster-content {
            position: relative;
            z-index: 3;
            color: white;
        }

        .poster-content h2 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.1;
            margin: 0 0 10px;
            letter-spacing: -1px;
        }

        .poster-content p {
            font-size: 1rem;
            opacity: 0.9;
            margin: 0;
            font-weight: 400;
        }

        /* Right Side - Form */
        .form-side {
            width: 460px;
            background: #fff;
            padding: 60px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* The Wavy Organic Shape Divider */
        .wavy-divider {
            position: absolute;
            top: 0;
            left: -80px;
            height: 100%;
            width: 100px;
            fill: #fff;
            z-index: 5;
            pointer-events: none;
        }

        .brand-logo {
            margin-bottom: 40px;
        }

        .brand-logo svg {
            width: 40px;
            height: 40px;
            fill: var(--primary);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 10px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 16px;
            border: 1.5px solid #edf2ed;
            background: #fdfdfd;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 4px 20px rgba(45, 90, 39, 0.08);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            background: var(--primary);
            color: #fff;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(45, 90, 39, 0.2);
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(45, 90, 39, 0.3);
        }

        .btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            margin-top: 20px;
            padding: 14px;
            border-radius: 14px;
            background: #fff1f2;
            color: #e11d48;
            font-size: 0.85rem;
            border: 1px solid #ffe4e6;
            display: none;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                height: auto;
                max-width: 450px;
                border-radius: 30px;
            }
            .poster-side {
                height: 200px;
                padding: 30px;
            }
            .poster-content h2 {
                font-size: 1.8rem;
            }
            .form-side {
                width: 100%;
                padding: 40px 30px;
            }
            .wavy-divider {
                display: none;
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/signinpage-_rkhblM9.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>

<body>
    <div class="login-wrapper">
        <div class="poster-side">
            <div class="poster-image"></div>
            <div class="poster-content">
                <h2>Empower your<br>Learning.</h2>
                <p>Welcome to Vigyan.prep Test Series</p>
            </div>
        </div>
        
        <div class="form-side">
            <!-- Organic Wavy Shape -->
            <svg class="wavy-divider" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path d="M100 0 C70 10 70 30 100 40 L100 60 C70 70 70 90 100 100 Z" />
            </svg>

            <div class="brand-logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3m0 2.23L5.8 8.72v6.56L12 18.77l6.2-3.49V8.72L12 5.23z"/>
                </svg>
            </div>
            
            <h1>Student Login</h1>
            <p class="subtitle">Enter the Email used during payment and your 8-digit Roll Number to enter the hall.</p>
            
            <div class="input-group">
                <label for="emailInput">Registered Email</label>
                <input type="email" id="emailInput" placeholder="name@example.com">
            </div>
            
            <div class="input-group">
                <label for="tokenInput">Roll Number</label>
                <input type="text" id="tokenInput" placeholder="12345678" maxlength="8" pattern="[0-9]{8}"
                    inputmode="numeric">
            </div>
            
            <button class="btn" id="loginBtn" onclick="attemptLogin()">
                <span id="btnText">Enter Exam Hall</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
            
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        async function attemptLogin() {
            const email = document.getElementById("emailInput").value.trim().toLowerCase();
            const token = document.getElementById("tokenInput").value.trim();
            const btn = document.getElementById("loginBtn");
            const btnText = document.getElementById("btnText");
            const spinner = document.getElementById("btnSpinner");
            const errorDiv = document.getElementById("errorMsg");

            errorDiv.style.display = 'none';

            // ✅ FIX #1: Email validation with regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError("❌ Please enter a valid email address (e.g., student@example.com)");
                return;
            }

            // ✅ FIX #2: Roll number validation - must be 8 numeric digits
            const tokenRegex = /^[0-9]{8}$/;
            if (!tokenRegex.test(token)) {
                showError("❌ Roll number must be exactly 8 numeric digits");
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                console.log('🚀 Sending login request to:', `${API_BASE_URL}/api/exam/start`);

                // ✅ FIX #3: Add 15-second timeout
                const response = await axios.post(`${API_BASE_URL}/api/exam/start`, {
                    rollNumber: token,
                    email: email
                }, {
                    timeout: 15000 // 15 seconds
                });

                console.log('✅ Login response:', response.data);

                if (response.data.success) {
                    console.log('💾 Saving login data to localStorage...');

                    // 🔥 CRITICAL: Set ALL required keys for unified user panel
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userRollNumber', token); // ✅ Unified key (Roll Number)
                    // 🔒 FIX: Save actual JWT token from backend, NOT the roll number
                    const authToken = response.data.authToken || response.data.token;
                    if (authToken) {
                        localStorage.setItem('userToken', authToken);
                        console.log('✅ Auth token saved to userToken');
                    } else {
                        // Fallback for older API versions or missing tokens
                        localStorage.setItem('userToken', token);
                        console.warn('⚠️ No auth token received from server, fallback to roll number');
                    }

                    // Parse and normalize purchased tests
                    const tests = response.data.purchasedTests || [];
                    const normalizedTests = tests.map(t => {
                        // Normalize to lowercase (iat, nest, isi)
                        if (typeof t === 'string') {
                            return t.toLowerCase().replace(' series', '').trim();
                        }
                        return t;
                    });

                    localStorage.setItem('purchasedTests', JSON.stringify(normalizedTests));

                    console.log('✅ Saved:', {
                        email,
                        rollNumber: token,
                        hasAuthToken: !!response.data.authToken,
                        tests: normalizedTests
                    });

                    btn.style.backgroundColor = "#10b981";
                    spinner.style.display = 'none';
                    btnText.innerText = "Verified ✓";
                    btnText.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = "testfirstpage.html";
                    }, 1000);
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.style.display = 'block';

                // ✅ FIX #3: Better error message classification
                let msg = "Server Error. Please try again.";

                if (error.code === 'ECONNABORTED' || error.message.includes('timeout')) {
                    msg = "⏱️ Connection timeout. Please check your internet and try again.";
                } else if (error.code === 'ERR_NETWORK') {
                    msg = "🌐 Cannot connect to server. Please check your internet connection.";
                } else if (error.response) {
                    if (error.response.status === 404) {
                        msg = "❌ Invalid credentials. Please check your email and roll number.";
                    } else if (error.response.data?.message) {
                        msg = error.response.data.message;
                    }
                }

                showError(msg);
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById("errorMsg");
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });

        // Particle Animation Logic
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        let w, h, particles = [];
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() { this.init(); }
            init() { this.x = Math.random() * w; this.y = h + Math.random() * 100; this.size = Math.random() * 50 + 10; this.speed = Math.random() * 0.5 + 0.2; this.opacity = Math.random() * 0.1 + 0.05; }
            update() { this.y -= this.speed; if (this.y < -50) this.init(); }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`; ctx.fill(); }
        }
        for (let i = 0; i < 30; i++) particles.push(new Particle());
        function animate() { ctx.clearRect(0, 0, w, h); for (let p of particles) { p.update(); p.draw(); } requestAnimationFrame(animate); }
        animate();
    </script>
</body>

</html>
