    <style>
        * {

        :root {

        body {

            z-index: 1;

        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 95%;
            max-width: 1100px;
            height: 680px;
            background: var(--white);
            border-radius: 48px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.3);
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .poster-side {
            flex: 1.1;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 55px;
        }

        .poster-bg {
            position: absolute;
            inset: 0;
            background: url('/vp-assets-v2/login_poster-DaQZKAUD.png') no-repeat center center/cover;
            z-index: 1;
            transition: transform 1.2s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .poster-side:hover .poster-bg {
            transform: scale(1.05);
        }

        .poster-side::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(26, 58, 95, 0.1) 0%, rgba(13, 29, 48, 0.4) 100%);

        }

        .social-proof {

            z-index: 3;

            backdrop-filter: blur(12px);

            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .poster-content {
            position: relative;
            z-index: 3;

            text-shadow: 0 10px 30px rgba(0,0,0,0.2);

        .poster-content h2 {
            font-size: 3.8rem;
            font-weight: 800;

            margin: 0 0 20px;
            letter-spacing: -2px;
        }

        .poster-content p {
            font-size: 1.15rem;
            font-weight: 400;
            opacity: 0.95;
            margin: 0;
            max-width: 90%;
            letter-spacing: 0.3px;
        }

        .form-side {
            width: 480px;
            background: #f7faf7; /* Soft Sage Green Architecture */

            z-index: 5;

        .curb-container {
            position: absolute;
            top: 0;
            left: -150px;
            height: 100%;
            width: 200px;
            pointer-events: none;
            z-index: 2;
        }

        .curb {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
        }

        .curb-white { fill: #f7faf7; z-index: 10; }
        .curb-accent { fill: var(--accent); opacity: 0.15; z-index: 9; transform: translateX(-20px); }

        /* OFFICIAL BRAND LOGO STYLES */
        .brand-logo {
            margin-bottom: 45px;
            display: inline-flex;
            align-items: baseline;
            cursor: pointer;
        }

        .logo-vigyan {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-style: italic;
            font-size: 2.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #1a2e1a 0%, #2d5a27 25%, #1a2e1a 50%, #2d5a27 75%, #1a2e1a 100%);
            background-size: 200% 200%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: brandShimmer 4s ease-in-out infinite;
        }

        @keyframes brandShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-dot {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            color: rgba(45, 90, 39, 0.4);
            margin-left: 2px;
        }

        .logo-prep {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 400;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: lowercase;
            color: rgba(45, 90, 39, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px;
            letter-spacing: -1px;
            color: var(--text-main);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 45px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px;
            border-radius: 20px;
            border: 1.5px solid #ecefec;
            background: #ffffff;
            font-size: 1rem;
            color: var(--text-main);
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 10px 40px rgba(45, 90, 39, 0.08);
        }

        .btn {
            width: 100%;
            padding: 20px;
            border-radius: 24px;
            background: var(--primary);
            color: var(--white);
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(45, 90, 39, 0.2);
            margin-top: 25px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .btn:active::after {
            width: 300px;
            height: 300px;
            opacity: 0;
        }

        .btn:hover {
            background: var(--primary-light);
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 25px 60px rgba(45, 90, 39, 0.4);
        }

        .btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-msg {
            margin-top: 25px;
            padding: 16px;
            border-radius: 18px;
            background: #fff1f2;
            color: #d0052b;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #ffe4e6;
            display: none;
            animation: shake 0.4s ease-in-out;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .back-home {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 100px;
            color: var(--white);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
        }

        .back-home:hover {
            background: var(--white);
            color: var(--primary);
            transform: translateX(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .back-home svg {
            width: 18px;
            height: 18px;
            transition: var(--transition);
        }

        @media (max-width: 900px) {
            .back-home {
                top: 20px;
                right: 20px;
                padding: 10px 16px;
                background: rgba(255, 255, 255, 0.8);
                color: var(--primary);
            }
            .login-wrapper {
                flex-direction: column;
                height: auto;
                max-width: 500px;
                border-radius: 35px;
            }
            .poster-side {
                height: 280px;
                padding: 30px;
            }
            .poster-content h2 {
                font-size: 2.2rem;
            }
            .form-side {
                width: 100%;
                padding: 50px 30px;
            }
            .curb-container {
                display: none;
            }
        }
    </style>
</head>

<body>
    <a href="index.html" class="back-home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        <span>Back to Home</span>
    </a>
    <div class="login-wrapper">
        <div class="poster-side">
            <div class="poster-bg"></div>
            
            <div class="social-proof">
                JOIN US ON A JOURNEY TO EXCELLENCE
            </div>

            <div class="poster-content">
                <h2>Gateway to<br>Future Science.</h2>
                <p>Advanced Entrance Preparation with Vigyan.prep</p>
            </div>
        </div>
        
        <div class="form-side">
            <div class="curb-container">
                <svg class="curb curb-accent" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M100 0 C40 5 40 40 100 50 L100 50 C40 60 40 95 100 100 Z" />
                </svg>
                <svg class="curb curb-white" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path d="M100 0 C50 10 50 45 100 50 L100 50 C50 55 50 90 100 100 Z" />
                </svg>
            </div>

            <div class="brand-logo">
                <span class="logo-vigyan">Vigyan</span>
                <span class="logo-dot">.</span>
                <span class="logo-prep">prep</span>
            </div>
            
            <h1>Student Login</h1>
            <p class="subtitle">Enter the Email used during payment and your 8-digit Roll Number to enter the hall.</p>
            
            <div class="input-group">
                <label for="emailInput">Registered Email</label>
                <input type="email" id="emailInput" placeholder="name@example.com" autocomplete="email">
            </div>
            
            <div class="input-group">
                <label for="tokenInput">Roll Number</label>
                <input type="text" id="tokenInput" placeholder="12345678" maxlength="8" pattern="[0-9]{8}"
                    inputmode="numeric" title="8-digit roll number">
            </div>
            
            <button class="btn" id="loginBtn" onclick="attemptLogin()">
                <span id="btnText">Enter Exam Hall</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>
            
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <script>
        async function attemptLogin() {
            const email = document.getElementById("emailInput").value.trim().toLowerCase();
            const token = document.getElementById("tokenInput").value.trim();
            const btn = document.getElementById("loginBtn");
            const btnText = document.getElementById("btnText");
            const spinner = document.getElementById("btnSpinner");
            const errorDiv = document.getElementById("errorMsg");

            errorDiv.style.display = 'none';

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError("❌ Please enter a valid email address.");
                return;
            }

            const tokenRegex = /^[0-9]{8}$/;
            if (!tokenRegex.test(token)) {
                showError("❌ Roll number must be exactly 8 digits.");
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const response = await axios.post(`${API_BASE_URL}/api/exam/start`, {
                    rollNumber: token,
                    email: email
                }, { timeout: 15000 });

                if (response.data.success) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userRollNumber', token);
                    
                    const authToken = response.data.authToken || response.data.token;
                    localStorage.setItem('userToken', authToken || token);

                    const tests = response.data.purchasedTests || [];
                    const normalizedTests = tests.map(t => typeof t === 'string' ? t.toLowerCase().replace(' series', '').trim() : t);
                    localStorage.setItem('purchasedTests', JSON.stringify(normalizedTests));

                    btn.style.backgroundColor = "#10b981";
                    spinner.style.display = 'none';
                    btnText.innerText = "Verified ✓";
                    btnText.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = "testfirstpage.html";
                    }, 800);
                }
            } catch (error) {
                console.error('❌ Login error:', error);
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.style.display = 'block';

                let msg = "Server error. Please try again later.";
                if (error.code === 'ECONNABORTED') msg = "⏱️ Request timeout. Check your internet.";
                else if (error.response?.status === 404) msg = "❌ Invalid email or roll number.";
                else if (error.response?.data?.message) msg = error.response.data.message;

                showError(msg);
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById("errorMsg");
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        document.addEventListener('keypress', (e) => { if (e.key === 'Enter') attemptLogin(); });
    </script>
</body>
