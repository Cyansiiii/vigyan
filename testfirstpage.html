<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Series Matrix | Vigyan.prep</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="frontend/css/global.css?v=20260202-0317">
    <link rel="stylesheet" href="frontend/css/navbar.css?v=20260202-0317">
    <link rel="stylesheet" href="frontend/css/pages.css?v=20260202-0317">
    <link rel="stylesheet" href="frontend/css/user-panel.css?v=20260202-0317">
    <link rel="stylesheet" href="frontend/css/shared-nav-dropdown.css?v=20260202-0317">
    <link rel="stylesheet" href="frontend/css/mobile-nav.css?v=20260202-0317">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">

    <script>
        const API_BASE_URL = "https://vigyan-production.up.railway.app";
        const PAYMENT_API_URL = "https://vigyan-production.up.railway.app";
        window.API_BASE_URL = API_BASE_URL;
        window.PAYMENT_API_URL = PAYMENT_API_URL;
    </script>

    <style>
        /* [KEEPING ALL EXISTING STYLES - NOT SHOWING HERE FOR BREVITY] */
    </style>
</head>

<body>
    <!-- [KEEPING ALL EXISTING HTML - NOT SHOWING HERE FOR BREVITY] -->

    <script src="frontend/js/config.js?v=20260202-0317"></script>
    <script src="frontend/js/auth.js?v=20260202-0317"></script>
    <script src="frontend/js/user-panel.js?v=20260202-0317"></script>
    <script src="frontend/js/mobile-nav.js?v=20260202-0317"></script>

    <script>
        const testSeries = [
            { id: 'iat', iconColor: 'iat', iconEmoji: '⚡', name: 'IAT SERIES', subtitle: 'Speed Mastery', price: 1 },
            { id: 'nest', iconColor: 'nest', iconEmoji: '🔬', name: 'NEST SERIES', subtitle: 'Deep Dive', price: 1 },
            { id: 'isi', iconColor: 'isi', iconEmoji: '🏆', name: 'ISI SERIES', subtitle: 'Proof Academy', price: 1 }
        ];

        let countdownInterval = null;
        let secondsRemaining = 6;
        let paymentInProgress = false;

        const cardsContainer = document.getElementById('cardsContainer');
        testSeries.forEach(test => {
            const card = document.createElement('div');
            card.className = 'glass-panel flex flex-col justify-between';
            card.innerHTML = `
                <div>
                    <div class="series-icon-header">
                        <div class="card-icon icon-${test.iconColor}">${test.iconEmoji}</div>
                    </div>
                    <div class="flex justify-between items-start mb-8">
                        <span class="font-bold text-blue-500 uppercase tracking-widest text-[10px] border border-blue-500/30 px-3 py-1 rounded-full bg-blue-500/5">${test.id.toUpperCase()}</span>
                        <div class="text-right leading-none">
                            <span class="block text-5xl font-black text-white tracking-tight">₹${test.price}</span>
                            <span class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">One-time Access</span>
                        </div>
                    </div>
                    <h3 class="text-3xl font-black text-white mb-2 uppercase leading-none tracking-tight">${test.name}</h3>
                    <p class="text-gray-400 text-sm mb-6 font-medium">${test.subtitle}</p>
                    <div class="w-full h-px bg-white/10 mb-6"></div>
                    <ul class="text-gray-400 text-sm space-y-3 mb-8 font-medium">
                        <li class="flex items-center gap-2"><span class="text-blue-500">✦</span> Real exam patterns</li>
                        <li class="flex items-center gap-2"><span class="text-blue-500">✦</span> Instant access granted</li>
                    </ul>
                </div>
                <button id="btn-${test.id}" onclick="executePurchase('${test.id}', ${test.price})" class="buy-btn shadow-lg shadow-blue-900/30">Initialize Protocol</button>
            `;
            cardsContainer.appendChild(card);
        });

        window.onload = async function () {
            try {
                if (window.refreshUserDashboard) window.refreshUserDashboard();

                let purchased = [];
                try {
                    purchased = JSON.parse(localStorage.getItem("purchasedTests") || "[]");
                } catch (parseError) {
                    console.error("Corrupted localStorage data:", parseError);
                    localStorage.removeItem("purchasedTests");
                }

                if (purchased.length > 0) {
                    const banner = document.getElementById('calendarBanner');
                    banner.style.display = 'flex';
                    banner.style.opacity = '0';
                    banner.style.transform = 'translateY(-20px)';
                    setTimeout(() => {
                        banner.style.transition = 'all 0.5s ease-out';
                        banner.style.opacity = '1';
                        banner.style.transform = 'translateY(0)';
                    }, 100);
                }

                testSeries.forEach(test => {
                    if (purchased.includes(test.id)) markAsPurchased(test.id);
                });
            } catch (error) {
                console.error("Critical error during page load:", error);
            }
        };

        function markAsPurchased(testId) {
            const btn = document.getElementById(`btn-${testId}`);
            if (btn) {
                btn.innerHTML = "★ ACCESS GRANTED - START TEST";
                btn.style.background = "#10b981";
                btn.onclick = () => {
                    localStorage.setItem("currentTestId", testId);
                    window.location.href = "pre-test-dashboard.html?test=" + testId;
                };
            }
        }

        // ✅ FIX: Removed problematic check-purchase call - backend handles duplicates
        async function executePurchase(testId, amount) {
            localStorage.setItem("tempTestId", testId);
            localStorage.setItem("tempAmount", amount);
            document.getElementById("emailModal").style.display = "flex";
            document.getElementById("modalError").classList.add("hidden");

            const savedEmail = localStorage.getItem("userEmail");
            const savedName = localStorage.getItem("userName");
            if (savedEmail) document.getElementById("modalUserEmail").value = savedEmail;
            if (savedName) document.getElementById("modalUserName").value = savedName;
            document.getElementById("modalUserName").focus();
        }

        function closeEntryModal() {
            document.getElementById("emailModal").style.display = "none";
            document.getElementById("modalError").classList.add("hidden");
        }

        function showModalError(message) {
            const errorDiv = document.getElementById("modalError");
            errorDiv.textContent = message;
            errorDiv.classList.remove("hidden");
        }

        function copyRollNumber() {
            const rollNumber = document.getElementById('finalTokenDisplay').innerText;
            const copyBtn = document.getElementById('copyRollBtn');
            navigator.clipboard.writeText(rollNumber).then(() => {
                copyBtn.innerHTML = '<i class="fas fa-check"></i> COPIED!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.innerHTML = '<i class="fas fa-copy"></i> COPY ROLL NUMBER';
                    copyBtn.classList.remove('copied');
                }, 2000);
            }).catch(err => console.error('Failed to copy:', err));
        }

        function startCountdown() {
            secondsRemaining = 6;
            const countdownElement = document.getElementById('countdownTimer');
            countdownInterval = setInterval(() => {
                secondsRemaining--;
                countdownElement.textContent = secondsRemaining;
                if (secondsRemaining <= 0) {
                    clearInterval(countdownInterval);
                    closeSuccessModal();
                }
            }, 1000);
        }

        function cancelRedirect() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            const countdownElement = document.getElementById('countdownTimer');
            countdownElement.parentElement.innerHTML = '<i class="fas fa-check-circle"></i> Auto-redirect cancelled';
        }

        function closeSuccessModal() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }

            document.getElementById("successModal").style.display = "none";
            const testId = localStorage.getItem("tempTestId");

            localStorage.removeItem("tempTestId");
            localStorage.removeItem("tempAmount");

            if (testId) markAsPurchased(testId);
            document.getElementById('calendarBanner').style.display = 'flex';

            if (window.renderUserPanelDirect) {
                const email = localStorage.getItem("userEmail");
                const rollNumber = localStorage.getItem("userRollNumber");
                const purchasedTests = JSON.parse(localStorage.getItem("purchasedTests") || "[]");
                window.renderUserPanelDirect({ email, rollNumber, tests: purchasedTests });
            }
        }

        async function handleModalSubmit() {
            if (paymentInProgress) {
                console.warn("Payment already in progress");
                return;
            }

            const emailInput = document.getElementById("modalUserEmail").value.trim().toLowerCase();
            const nameInput = document.getElementById("modalUserName").value.trim();
            const btn = document.getElementById("modalActionBtn");

            document.getElementById("modalError").classList.add("hidden");

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailInput || !emailRegex.test(emailInput)) {
                showModalError("❌ Please enter a valid email address");
                return;
            }

            const nameRegex = /^[a-zA-Z\s]{2,50}$/;
            if (!nameInput || !nameRegex.test(nameInput)) {
                showModalError("❌ Please enter your full name (letters and spaces only)");
                return;
            }

            paymentInProgress = true;
            localStorage.setItem("userEmail", emailInput);
            localStorage.setItem("userName", nameInput);

            try {
                await startPayment(
                    emailInput,
                    nameInput,
                    null,
                    localStorage.getItem("tempTestId"),
                    localStorage.getItem("tempAmount")
                );
            } finally {
                paymentInProgress = false;
            }
        }

        async function startPayment(userEmail, fullName, studentId, testId, amount) {
            if (typeof Razorpay === "undefined") {
                showModalError("❌ Payment gateway failed to load. Please refresh the page.");
                return;
            }

            const btn = document.getElementById("modalActionBtn");
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Creating Order...';

            try {
                console.log('✅ Creating order for:', testId);
                const orderRes = await axios.post(`${PAYMENT_API_URL}/api/payment/checkout`, {
                    amount: amount,
                    testId: testId,
                    email: userEmail
                }, { timeout: 15000 });

                if (!orderRes.data.success || !orderRes.data.orderId) {
                    throw new Error('Failed to create order');
                }

                const { orderId, amount: orderAmount, currency, key } = orderRes.data;
                btn.innerHTML = '<span class="loading-spinner"></span> Opening Razorpay...';

                const options = {
                    key: key,
                    amount: orderAmount,
                    currency: currency,
                    name: "Vigyan.prep",
                    description: `Activate ${testId.toUpperCase()} Test Series`,
                    order_id: orderId,
                    prefill: { email: userEmail },
                    theme: { color: "#3b82f6" },
                    handler: async function (response) {
                        try {
                            console.log('✅ Payment completed, verifying...');
                            btn.innerHTML = '<span class="loading-spinner"></span> Verifying Payment...';
                            
                            const verifyRes = await axios.post(`${PAYMENT_API_URL}/api/payment/paymentverification`, {
                                razorpay_order_id: response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature: response.razorpay_signature,
                                testId: testId,
                                email: userEmail,
                                amount: amount,
                                fullName: fullName
                            }, { timeout: 20000 });

                            console.log('✅ Verification response:', verifyRes.data);

                            if (verifyRes.data && verifyRes.data.success) {
                                const rollNumber = verifyRes.data.rollNumber;
                                console.log('✅ Roll number received:', rollNumber);
                                
                                localStorage.setItem("userEmail", userEmail);
                                localStorage.setItem("userName", fullName);
                                localStorage.setItem("userRollNumber", rollNumber);
                                localStorage.setItem("currentTestId", testId);

                                const purchased = JSON.parse(localStorage.getItem("purchasedTests") || "[]");
                                if (!purchased.includes(testId)) {
                                    purchased.push(testId);
                                }
                                localStorage.setItem("purchasedTests", JSON.stringify(purchased));

                                console.log('✅ Showing success modal...');
                                setTimeout(() => {
                                    closeEntryModal();
                                    document.getElementById("finalTokenDisplay").innerText = rollNumber;
                                    document.getElementById("successModal").style.display = "flex";
                                    startCountdown();
                                }, 200);
                            } else {
                                throw new Error('Verification failed');
                            }
                        } catch (verifyErr) {
                            console.error('❌ Verification error:', verifyErr);
                            showModalError("❌ Payment verification failed. Please contact support with payment ID: " + response.razorpay_payment_id);
                            btn.innerHTML = "Proceed to Payment";
                            btn.disabled = false;
                        }
                    },
                    modal: {
                        ondismiss: function () {
                            btn.innerHTML = "Proceed to Payment";
                            btn.disabled = false;
                        }
                    }
                };

                const rzp = new Razorpay(options);
                rzp.open();
            } catch (error) {
                console.error("Payment Error:", error);
                showModalError("❌ Payment failed: " + (error.message || "Unknown error"));
                btn.innerHTML = "Proceed to Payment";
                btn.disabled = false;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (document.getElementById('emailModal').style.display === 'flex') {
                    closeEntryModal();
                }
                if (document.getElementById('successModal').style.display === 'flex' && !countdownInterval) {
                    closeSuccessModal();
                }
            }
        });

        window.addEventListener('beforeunload', () => {
            if (countdownInterval) {
                clearInterval(countdownInterval);
            }
        });
    </script>
</body>

</html>
